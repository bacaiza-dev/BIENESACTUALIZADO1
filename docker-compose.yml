version: '3.8'

services:
  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: intbienes_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: intbienes
      MYSQL_USER: intuser
      MYSQL_PASSWORD: intpass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init/01-intbienes.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - intbienes_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intbienes_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin
      DB_NAME: intbienes
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3000
      FRONTEND_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - intbienes_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.simple
    container_name: intbienes_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
      VITE_APP_TITLE: "Sistema de Gestión de Bienes INT"
    ports:
      - "3002:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - intbienes_network

  # Nginx reverse proxy (opcional para producción)
  nginx:
    image: nginx:alpine
    container_name: intbienes_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - intbienes_network

networks:
  intbienes_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local